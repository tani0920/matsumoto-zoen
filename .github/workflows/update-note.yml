name: Update Note Articles

on:
  schedule:
    - cron: '0 1 * * *'  # 毎日午前10時（JST）に実行
  workflow_dispatch:       # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Note RSS and update JSON
        run: |
          python3 << 'PYEOF'
          import urllib.request, xml.etree.ElementTree as ET, json, re
          from email.utils import parsedate
          from datetime import datetime

          url = "https://note.com/matsumoto_363565/rss"
          with urllib.request.urlopen(url) as r:
              raw = r.read().decode('utf-8')

          thumb_map = {}
          items_raw = re.split(r'<item>', raw)[1:]
          for chunk in items_raw[:3]:
              link_m = re.search(r'<link>(https://note\.com/[^<]+)</link>', chunk)
              thumb_m = re.search(r'<media:thumbnail[^>]*>([^<]+)</media:thumbnail>', chunk)
              if link_m:
                  thumb_map[link_m.group(1)] = thumb_m.group(1) if thumb_m else ''

          root = ET.fromstring(raw.encode('utf-8'))
          items = []
          for item in root.findall('./channel/item')[:3]:
              title = item.findtext('title', '')
              link  = item.findtext('link', '')
              date  = item.findtext('pubDate', '')
              image = thumb_map.get(link, '')
              try:
                  d = datetime(*parsedate(date)[:6])
                  date_fmt = f"{d.year}年{d.month}月{d.day}日"
              except:
                  date_fmt = date
              items.append({"title": title, "link": link, "date": date_fmt, "image": image})
              print(f"  {date_fmt} | {title[:40]}")

          with open('data/note-articles.json', 'w', encoding='utf-8') as f:
              json.dump(items, f, ensure_ascii=False, indent=2)
          print("✓ note-articles.json updated")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/note-articles.json
          git diff --staged --quiet || git commit -m "chore: update note articles [skip ci]"
          git push
